name: 更新行情数据

on:
  # 每天5次：北京时间 09:30 / 10:30 / 13:30 / 14:30 / 22:00
  schedule:
    - cron: '30 1 * * *'
    - cron: '30 2 * * *'
    - cron: '30 5 * * *'
    - cron: '0 7 * * *'
    - cron: '0 14 * * *'
  # 手动触发（通过 repository_dispatch 事件）
  repository_dispatch:
    types: [refresh-data]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 网络连通性诊断
        run: |
          echo "=== DNS ==="
          nslookup money.finance.sina.com.cn 2>&1 | head -5
          echo "=== TCP (port 443) ==="
          timeout 5 bash -c 'echo >/dev/tcp/money.finance.sina.com.cn/443' 2>&1 && echo "OPEN" || echo "BLOCKED"
          echo "=== HTTP test ==="
          curl -sI --max-time 5 "https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=sh000300&scale=240&ma=no&datalen=1" 2>&1 | head -3
          echo "=== FRED (VIX) ==="
          curl -sI --max-time 5 "https://fred.stlouisfed.org/graph/fredgraph.csv?id=VIXCLS" 2>&1 | head -3

      - name: 运行数据抓取脚本
        run: python scripts/fetch_data.py

      - name: 提交更新
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/gaoyingxie/permanent-portfolio.git
          # stash 脚本新写入的 market.json，然后拉取远程最新，再 stash pop 回来
          git stash push -m "local market data" || true
          git pull --rebase origin main
          # stash pop 后，新 market.json 会覆盖冲突文件，但 git 会标记为已暂存
          git stash pop || true
          # 提交（如果有变化）
          if git diff --quiet HEAD -- data/market.json; then
            echo "market.json 无变化，跳过 push"
          else
            git add data/market.json
            git commit -m "auto: 更新行情数据 $(date '+%Y-%m-%d %H:%M')"
            git push --force-with-lease origin main
          fi

      - name: 触发 GitHub Pages 部署
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # workflow_run 的 push 不触发 pages 部署，用 PAT 手动 dispatch
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/gaoyingxie/permanent-portfolio/dispatches \
            -d '{"event_type":"refresh-data"}'
