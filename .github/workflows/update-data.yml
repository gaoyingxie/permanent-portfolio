name: 更新行情数据

on:
  # 每天5次：北京时间 09:30 / 10:30 / 13:30 / 14:30 / 22:00
  schedule:
    - cron: '30 1 * * *'
    - cron: '30 2 * * *'
    - cron: '30 5 * * *'
    - cron: '0 7 * * *'
    - cron: '0 14 * * *'
  # 手动触发（通过 repository_dispatch 事件）
  repository_dispatch:
    types: [refresh-data]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 网络连通性诊断
        run: |
          echo "=== DNS ==="
          nslookup money.finance.sina.com.cn 2>&1 | head -5
          echo "=== TCP (port 443) ==="
          timeout 5 bash -c 'echo >/dev/tcp/money.finance.sina.com.cn/443' 2>&1 && echo "OPEN" || echo "BLOCKED"
          echo "=== HTTP test ==="
          curl -sI --max-time 5 "https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=sh000300&scale=240&ma=no&datalen=1" 2>&1 | head -3
          echo "=== FRED (VIX) ==="
          curl -sI --max-time 5 "https://fred.stlouisfed.org/graph/fredgraph.csv?id=VIXCLS" 2>&1 | head -3

      - name: 运行数据抓取脚本
        run: python scripts/fetch_data.py

      - name: 提交更新
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/gaoyingxie/permanent-portfolio.git
          # 抓取远程最新后合并，不 rebase，避免冲突标记
          git fetch origin main
          git merge origin/main --no-edit -q
          # 重新运行抓取脚本（确保用的是最新代码）
          python3 scripts/fetch_data.py
          # 通过 GitHub API 更新 market.json（避免 git force push 覆盖代码改动）
          python3 -c "
import json, base64, urllib.request, subprocess, os
token = os.environ['GH_TOKEN']
repo = 'gaoyingxie/permanent-portfolio'
path = 'data/market.json'
# 获取当前 SHA
req = urllib.request.Request(
    f'https://api.github.com/repos/{repo}/contents/{path}',
    headers={'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github.v3+json'}
)
with urllib.request.urlopen(req, timeout=10) as r:
    sha = json.loads(r.read())['sha']
# 读取本地文件
with open(path) as f:
    content = f.read()
json.loads(content)  # 验证 JSON 合法
encoded = base64.b64encode(content.encode('utf-8')).decode('ascii')
# 推送
data = json.dumps({'message': 'auto: 更新行情数据 $(date +%Y-%m-%d\ %H:%M)', 'content': encoded, 'sha': sha}).encode()
req2 = urllib.request.Request(
    f'https://api.github.com/repos/{repo}/contents/{path}',
    data=data,
    headers={'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json'},
    method='PUT'
)
try:
    with urllib.request.urlopen(req2, timeout=15) as r:
        result = json.loads(r.read())
        print('market.json updated:', result['commit']['sha'][:8])
except urllib.error.HTTPError as e:
    if e.code == 409:
        print('market.json 冲突，跳过')
    else:
        print('HTTP Error:', e.code, e.read().decode()[:200])
"

      - name: 触发 GitHub Pages 部署
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # workflow_run 的 push 不触发 pages 部署，用 PAT 手动 dispatch
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/gaoyingxie/permanent-portfolio/dispatches \
            -d '{"event_type":"refresh-data"}'
