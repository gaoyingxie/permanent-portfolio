name: 更新行情数据

on:
  # 每天5次：北京时间 09:30 / 10:30 / 13:30 / 14:30 / 22:00
  schedule:
    - cron: '30 1 * * *'
    - cron: '30 2 * * *'
    - cron: '30 5 * * *'
    - cron: '0 7 * * *'
    - cron: '0 14 * * *'
  # 手动触发（通过 repository_dispatch 事件）
  repository_dispatch:
    types: [refresh-data]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 网络连通性诊断
        run: |
          echo "=== DNS ==="
          nslookup money.finance.sina.com.cn 2>&1 | head -5
          echo "=== TCP (port 443) ==="
          timeout 5 bash -c 'echo >/dev/tcp/money.finance.sina.com.cn/443' 2>&1 && echo "OPEN" || echo "BLOCKED"
          echo "=== HTTP test ==="
          curl -sI --max-time 5 "https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=sh000300&scale=240&ma=no&datalen=1" 2>&1 | head -3
          echo "=== FRED (VIX) ==="
          curl -sI --max-time 5 "https://fred.stlouisfed.org/graph/fredgraph.csv?id=VIXCLS" 2>&1 | head -3

      - name: 运行数据抓取脚本
        run: python scripts/fetch_data.py

      - name: 提交更新
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config credential.helper '!echo password=${GH_TOKEN}'
          git remote set-url origin https://github.com/gaoyingxie/permanent-portfolio.git
          git fetch origin

          # 检查 remote 是否有新的 commit（其他 push），如果有则跳过避免覆盖
          if git log origin/main..HEAD --oneline | grep -q .; then
            echo "有本地新 commit，正常推送..."
            git push origin main
          else
            echo "Remote 没有新内容（或已有其他push），跳过 push"
          fi

      - name: 触发 GitHub Pages 部署
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # workflow_run 的 push 不触发 pages 部署，用 PAT 手动 dispatch
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/gaoyingxie/permanent-portfolio/dispatches \
            -d '{"event_type":"refresh-data"}'
